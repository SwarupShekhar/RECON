# Install: sudo cp deploy/nginx/recon.vaidikedu.com.conf /etc/nginx/sites-available/recon
#          sudo ln -sf /etc/nginx/sites-available/recon /etc/nginx/sites-enabled/recon
# Cert:    sudo certbot --nginx -d recon.vaidikedu.com

server {
    listen 80;
    server_name recon.vaidikedu.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name recon.vaidikedu.com;

    # Certbot fills these paths on first run
    ssl_certificate /etc/letsencrypt/live/recon.vaidikedu.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/recon.vaidikedu.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:4050;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
