# HTTP only until certbot adds HTTPS (do not reference ssl cert paths before certbot runs).
# Install: sudo cp deploy/nginx/recon.vaidikedu.com.conf /etc/nginx/sites-available/recon
#          sudo ln -sf /etc/nginx/sites-available/recon /etc/nginx/sites-enabled/recon
#          sudo nginx -t && sudo systemctl reload nginx
# Cert:    sudo certbot --nginx -d recon.vaidikedu.com

server {
    listen 80;
    server_name recon.vaidikedu.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        proxy_pass http://127.0.0.1:4050;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
