services:
  recon:
    build: .
    container_name: recon
    restart: unless-stopped
    ports:
      - "127.0.0.1:4050:4050"
    env_file:
      - server/.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:4050/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
