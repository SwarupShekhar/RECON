name: Deploy to Vultr

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-recon-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Trust Vultr host key
        run: ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy over SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          APP_DIR: ${{ secrets.APP_DIR }}
        run: |
          set -euo pipefail
          APP_DIR="${APP_DIR:-/opt/recon}"
          ssh -o BatchMode=yes "${SSH_USER}@${SSH_HOST}" bash -s <<EOF
          set -euo pipefail
          cd "${APP_DIR}"
          git fetch origin main
          git reset --hard origin/main
          docker compose build
          docker compose up -d
          docker image prune -f
          for i in \$(seq 1 30); do
            if curl -fsS http://127.0.0.1:4050/health; then
              echo "Health check passed"
              exit 0
            fi
            echo "Health check attempt \$i failed, retrying in 2s..."
            sleep 2
          done
          echo "Health check failed after 30 attempts"
          docker compose logs --tail=50
          exit 1
          EOF
