<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 300px; padding: 16px; font-family: -apple-system, sans-serif; }
    h3 { margin: 0 0 12px; font-size: 14px; }
    label { font-size: 12px; color: #555; }
    input[type="text"], input[type="email"] { width: 100%; padding: 6px; margin: 4px 0 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; box-sizing: border-box; }
    .checkbox-row { display: flex; align-items: center; gap: 6px; margin: 4px 0 14px; font-size: 12px; color: #555; }
    .checkbox-row input[type="checkbox"] { width: auto; margin: 0; }
    button { width: 100%; padding: 8px; background: #1a73e8; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; }
    button:hover { background: #1557b0; }
    .status { margin-top: 8px; font-size: 12px; color: #34a853; }
    .error { color: #d93025; }
  </style>
</head>
<body>
  <h3>Recon</h3>
  <label>API Server URL</label>
  <input type="text" id="serverUrl" placeholder="https://track.yourdomain.com">
  <label>Your Email</label>
  <input type="email" id="senderEmail" placeholder="you@company.com">
  <label class="checkbox-row">
    <input type="checkbox" id="alertsEnabled">
    Enable desktop alerts
  </label>
  <button id="save">Save</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
