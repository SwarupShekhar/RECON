<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    :root {
      --bg: #f7f8f7;
      --surface: #fff;
      --border: #e2e5e2;
      --text: #1a1d1a;
      --muted: #6b726b;
      --accent: #2d8a4e;
      --accent-hover: #247a42;
      --accent-soft: #e8f5ec;
      --warn: #c47a1a;
      --danger: #c0392b;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #161816;
        --surface: #1e211e;
        --border: #2e332e;
        --text: #e8ebe8;
        --muted: #9aa39a;
        --accent: #4cb870;
        --accent-hover: #5ec880;
        --accent-soft: #1e3326;
        --warn: #e09a3a;
        --danger: #e06050;
      }
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      line-height: 1.45;
    }
    .header {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .header img { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; }
    .header-logo { position: relative; display: inline-flex; flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%; overflow: hidden; }
    .header-logo-sweep {
      position: absolute; inset: 0; border-radius: 50%; pointer-events: none;
      background: conic-gradient(from 0deg, transparent 0deg, rgba(0, 210, 255, 0.35) 28deg, transparent 56deg);
      animation: recon-sweep 3.5s linear infinite;
    }
    @keyframes recon-sweep { to { transform: rotate(360deg); } }
    @media (prefers-reduced-motion: reduce) {
      .header-logo-sweep { animation: none; opacity: 0; }
    }
    .header-title { font-size: 14px; font-weight: 650; letter-spacing: -0.01em; }
    .header-sub { font-size: 11px; color: var(--muted); }
    .body { padding: 14px 16px 16px; }
    label { display: block; font-size: 11px; font-weight: 600; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.03em; }
    input[type="text"], input[type="email"], input[type="password"] {
      width: 100%; padding: 8px 10px; margin-bottom: 12px;
      border: 1px solid var(--border); border-radius: 6px;
      font-size: 13px; background: var(--surface); color: var(--text);
    }
    input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 25%, transparent); }
    input[readonly] { color: var(--muted); background: color-mix(in srgb, var(--text) 4%, transparent); cursor: default; }
    .field-hint { font-size: 11px; color: var(--muted); margin: -8px 0 12px; }
    .checkbox-row { display: flex; align-items: center; gap: 8px; margin: 4px 0 14px; font-size: 12px; color: var(--muted); }
    .checkbox-row input[type="checkbox"] { width: auto; margin: 0; accent-color: var(--accent); }
    button#save {
      width: 100%; padding: 9px; background: var(--accent); color: #fff;
      border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600;
    }
    button#save:hover { background: var(--accent-hover); }
    .status { margin-top: 8px; font-size: 12px; color: var(--accent); }
    .error { color: var(--danger); }
    .logged-in {
      font-size: 11px; color: var(--muted); margin-bottom: 12px;
      padding: 6px 10px; background: var(--accent-soft); border-radius: 6px;
    }
    .logged-in strong { color: var(--text); font-weight: 600; }

    .recon-section-title {
      margin: 16px 0 8px; font-size: 11px; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.03em;
      border-top: 1px solid var(--border); padding-top: 14px;
    }
    .recon-list { max-height: 240px; overflow-y: auto; }
    .recon-item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 0; border-bottom: 1px solid var(--border);
    }
    .recon-item:last-child { border-bottom: none; }
    .recon-dot { flex-shrink: 0; width: 7px; height: 7px; border-radius: 50%; }
    .recon-item-text { flex: 1; min-width: 0; }
    .recon-item-subject { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .recon-item-meta { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .recon-item-status { flex-shrink: 0; font-size: 10px; color: var(--muted); text-align: right; max-width: 72px; line-height: 1.3; }
    .recon-empty { font-size: 12px; color: var(--muted); padding: 12px 0; text-align: center; }
    .recon-badge {
      display: inline-block; font-size: 9px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.04em; padding: 1px 5px; border-radius: 4px;
      background: var(--accent-soft); color: var(--accent); margin-left: 4px; vertical-align: middle;
    }
    .footer-link {
      display: block; text-align: center; margin-top: 12px;
      font-size: 11px; color: var(--muted); text-decoration: none;
    }
    .footer-link:hover { color: var(--accent); }
  </style>
</head>
<body>
  <div class="header">
    <span class="header-logo">
      <img src="icons/icon48.png" alt="">
      <span class="header-logo-sweep" aria-hidden="true"></span>
    </span>
    <div>
      <div class="header-title">Recon</div>
      <div class="header-sub">Email intelligence</div>
    </div>
  </div>

  <div class="body">
    <div id="loggedInAs" class="logged-in" style="display:none;">Logged in as <strong id="loggedInEmail"></strong></div>

    <label for="serverUrl">API Server URL</label>
    <input type="text" id="serverUrl" placeholder="https://your-recon-server.com" readonly>

    <label for="apiKey">API Key</label>
    <input type="password" id="apiKey" placeholder="recon_… (from dashboard)">
    <div class="field-hint">Generate at Dashboard &rarr; Extension Key, then paste here and Save.</div>

    <input type="hidden" id="senderEmail">

    <label class="checkbox-row">
      <input type="checkbox" id="alertsEnabled">
      Desktop alerts on new opens
    </label>

    <button id="save">Save</button>
    <div id="status"></div>

    <div class="recon-section-title">Recent Sent</div>
    <div id="reconList" class="recon-list">
      <div class="recon-empty">Loading…</div>
    </div>

    <a id="dashboardLink" class="footer-link" href="#" target="_blank" rel="noopener">Open full dashboard</a>
  </div>

  <script src="config.defaults.js"></script>
  <script src="popup.js"></script>
</body>
</html>
